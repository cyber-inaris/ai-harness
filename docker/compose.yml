services:
  gateway-check:
    image: nginx:1.27-alpine
    profiles: ["example"]
    ports:
      - "18080:80"

  # Future service slots. Keep real router/agent images in a local override file
  # until the exact tools are chosen.
  hermes:
    image: ghcr.io/example/hermes:placeholder
    profiles: ["disabled"]
    env_file:
      - /opt/ai-harness/secrets/hermes.env
    ports:
      - "127.0.0.1:3000:3000"

  router:
    image: ghcr.io/example/router:placeholder
    profiles: ["disabled"]
    env_file:
      - /opt/ai-harness/secrets/router.env
      - /opt/ai-harness/secrets/providers.env
    ports:
      - "127.0.0.1:4000:4000"

  benchmarks:
    image: ghcr.io/example/benchmarks:placeholder
    profiles: ["disabled"]
    env_file:
      - /opt/ai-harness/secrets/providers.env
    volumes:
      - /var/lib/ai-harness/benchmarks:/data/benchmarks
      - /var/lib/ai-harness/scores:/data/scores
    ports:
      - "127.0.0.1:5000:5000"
