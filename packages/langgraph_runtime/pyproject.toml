[project]
name = "ai-harness-langgraph-runtime"
version = "0.1.0"
description = "Minimal LangGraph task runtime for ai-harness"
requires-python = ">=3.11"
dependencies = [
  "langgraph>=1.0.0",
  "langgraph-checkpoint-sqlite>=2.0.0",
]

[project.scripts]
ai-harness-agent-task = "ai_harness_runtime.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_harness_runtime"]
