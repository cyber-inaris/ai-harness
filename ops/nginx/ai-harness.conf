server {
  listen 80 default_server;
  listen [::]:80 default_server;
  listen 8080 default_server;
  listen [::]:8080 default_server;

  server_name _;
  absolute_redirect off;

  access_log /var/log/nginx/ai-harness.access.log;
  error_log /var/log/nginx/ai-harness.error.log;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ai-harness ok\n";
  }

  location = / {
    add_header Content-Type text/plain;
    return 200 "ai-harness gateway\n";
  }

  location /hermes/ {
    proxy_pass http://127.0.0.1:9119/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:9119;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    sub_filter_once off;
    sub_filter 'src="/assets/index-BetPy7iv.js"' 'src="/assets/index-BetPy7iv.js?v=20260526a"';
    sub_filter 'href="/assets/index-C7MSayrA.css"' 'href="/assets/index-C7MSayrA.css?v=20260526a"';
    sub_filter 'href="/favicon.ico"' 'href="/favicon.ico?v=20260526a"';
  }

  # Hermes dashboard currently builds absolute root paths. Keep these routes
  # reserved for Hermes until it is moved to a dedicated hostname.
  location ~ ^/(assets/|favicon\.ico$|api/|chat/?|config/?|analytics/?|sessions/?|tools/?|cron/?|plugins/?|profiles/?|logs/?|model/?|gateway/?|skills/?|dashboard/?|pty/?) {
    proxy_pass http://127.0.0.1:9119;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:9119;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /router/ {
    proxy_pass http://127.0.0.1:20128/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /omniroute/ {
    proxy_pass http://127.0.0.1:20128/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    add_header Cache-Control "no-store" always;
    proxy_redirect ~^(/.*)$ /omniroute$1;
    sub_filter_once off;
    sub_filter_types text/css text/javascript application/javascript application/json;
    sub_filter 'href="/_next/' 'href="/omniroute/_next/';
    sub_filter 'src="/_next/' 'src="/omniroute/_next/';
    sub_filter 'href="/favicon' 'href="/omniroute/favicon';
    sub_filter 'href="/manifest' 'href="/omniroute/manifest';
    sub_filter 'href="/icon-' 'href="/omniroute/icon-';
    sub_filter 'href="/apple-touch-icon' 'href="/omniroute/apple-touch-icon';
    sub_filter 'href="/dashboard' 'href="/omniroute/dashboard';
    sub_filter 'href="/login' 'href="/omniroute/login';
    sub_filter '"/api/' '"/omniroute/api/';
    sub_filter "'/api/" "'/omniroute/api/";
    sub_filter '`/api/' '`/omniroute/api/';
    sub_filter '"/dashboard' '"/omniroute/dashboard';
    sub_filter '"/login' '"/omniroute/login';
    sub_filter '\"/_next/' '\"/omniroute/_next/';
    sub_filter '\"/api/' '\"/omniroute/api/';
    sub_filter '\"/dashboard' '\"/omniroute/dashboard';
    sub_filter '\"/login' '\"/omniroute/login';
    sub_filter '\"/favicon' '\"/omniroute/favicon';
    sub_filter '\"/manifest' '\"/omniroute/manifest';
    sub_filter '\"/icon-' '\"/omniroute/icon-';
    sub_filter '\"/apple-touch-icon' '\"/omniroute/apple-touch-icon';
  }

  location ~ ^/omniroute/(?:_next|api|login|dashboard|manifest\.webmanifest|favicon\.ico|favicon\.svg|icon-[^/]+|apple-touch-icon\.png)(.*)$ {
    rewrite ^/omniroute/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:20128;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Accept-Encoding "";
    add_header Cache-Control "no-store" always;
    proxy_redirect ~^(/.*)$ /omniroute$1;
    sub_filter_once off;
    sub_filter_types text/css text/javascript application/javascript application/json;
    sub_filter 'href="/_next/' 'href="/omniroute/_next/';
    sub_filter 'src="/_next/' 'src="/omniroute/_next/';
    sub_filter 'href="/favicon' 'href="/omniroute/favicon';
    sub_filter 'href="/manifest' 'href="/omniroute/manifest';
    sub_filter 'href="/icon-' 'href="/omniroute/icon-';
    sub_filter 'href="/apple-touch-icon' 'href="/omniroute/apple-touch-icon';
    sub_filter 'href="/dashboard' 'href="/omniroute/dashboard';
    sub_filter 'href="/login' 'href="/omniroute/login';
    sub_filter '"/api/' '"/omniroute/api/';
    sub_filter "'/api/" "'/omniroute/api/";
    sub_filter '`/api/' '`/omniroute/api/';
    sub_filter '"/dashboard' '"/omniroute/dashboard';
    sub_filter '"/login' '"/omniroute/login';
    sub_filter '\"/_next/' '\"/omniroute/_next/';
    sub_filter '\"/api/' '\"/omniroute/api/';
    sub_filter '\"/dashboard' '\"/omniroute/dashboard';
    sub_filter '\"/login' '\"/omniroute/login';
    sub_filter '\"/favicon' '\"/omniroute/favicon';
    sub_filter '\"/manifest' '\"/omniroute/manifest';
    sub_filter '\"/icon-' '\"/omniroute/icon-';
    sub_filter '\"/apple-touch-icon' '\"/omniroute/apple-touch-icon';
  }

  location /v1/ {
    proxy_pass http://127.0.0.1:20128/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    include /etc/nginx/proxy_params;
  }

  location /benchmarks/ {
    proxy_pass http://127.0.0.1:5000/;
    include /etc/nginx/proxy_params;
  }

  location /cockpit/ {
    proxy_pass http://127.0.0.1:9090/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/proxy_params;
  }

  location /webhooks/ {
    proxy_pass http://127.0.0.1:7000/;
    include /etc/nginx/proxy_params;
  }
}
