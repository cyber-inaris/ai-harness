server {
  listen 80 default_server;
  listen [::]:80 default_server;
  listen 8080 default_server;
  listen [::]:8080 default_server;

  server_name _;

  access_log /var/log/nginx/ai-harness.access.log;
  error_log /var/log/nginx/ai-harness.error.log;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ai-harness ok\n";
  }

  location = / {
    add_header Content-Type text/plain;
    return 200 "ai-harness gateway\n";
  }

  location /hermes/ {
    proxy_pass http://127.0.0.1:9119/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:9119;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    sub_filter_once off;
    sub_filter 'src="/assets/index-BetPy7iv.js"' 'src="/assets/index-BetPy7iv.js?v=20260526a"';
    sub_filter 'href="/assets/index-C7MSayrA.css"' 'href="/assets/index-C7MSayrA.css?v=20260526a"';
    sub_filter 'href="/favicon.ico"' 'href="/favicon.ico?v=20260526a"';
  }

  # Hermes dashboard currently builds absolute root paths. Keep these routes
  # reserved for Hermes until it is moved to a dedicated hostname.
  location ~ ^/(assets/|favicon\.ico$|api/|chat/?|config/?|analytics/?|sessions/?|tools/?|cron/?|plugins/?|profiles/?|logs/?|model/?|gateway/?|skills/?|dashboard/?|pty/?) {
    proxy_pass http://127.0.0.1:9119;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:9119;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /router/ {
    proxy_pass http://127.0.0.1:20128/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /omniroute/ {
    proxy_pass http://127.0.0.1:20128/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /v1/ {
    proxy_pass http://127.0.0.1:20128/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    include /etc/nginx/proxy_params;
  }

  location /benchmarks/ {
    proxy_pass http://127.0.0.1:5000/;
    include /etc/nginx/proxy_params;
  }

  location /cockpit/ {
    proxy_pass http://127.0.0.1:9090/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    include /etc/nginx/proxy_params;
  }

  location /webhooks/ {
    proxy_pass http://127.0.0.1:7000/;
    include /etc/nginx/proxy_params;
  }
}

server {
  listen 80;
  listen [::]:80;
  listen 8080;
  listen [::]:8080;

  server_name omniroute.ss-promotion.com;

  access_log /var/log/nginx/omniroute.access.log;
  error_log /var/log/nginx/omniroute.error.log;

  location / {
    proxy_pass http://127.0.0.1:20128;
    proxy_http_version 1.1;
    proxy_set_header Host 127.0.0.1:20128;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
