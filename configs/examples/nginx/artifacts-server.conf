# Testable standalone nginx example for AI Harness task artifacts.
# This is useful for `nginx -t -c ...` syntax checks.
#
# Production can either adapt this server block or include
# configs/examples/nginx/artifacts.conf inside an existing server block.

events {}

http {
  server {
    listen 127.0.0.1:8080;
    server_name _;

    location /artifacts/tasks/ {
      auth_basic "AI Harness Artifacts";
      auth_basic_user_file /etc/nginx/.htpasswd;

      alias /var/lib/ai-harness/tasks/;

      autoindex on;
      autoindex_exact_size off;
      autoindex_localtime on;

      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
      add_header Cache-Control "private, no-store" always;

      limit_except GET HEAD {
        deny all;
      }
    }

    location ~* ^/artifacts/tasks/.*(\.env|\.key|\.pem|\.p12|\.sqlite|\.db)$ {
      deny all;
    }

    location ~* ^/artifacts/tasks/.*(secret|token|cookie|password|credential) {
      deny all;
    }
  }
}
