# Example nginx snippet for read-only AI Harness task artifacts.
# Include this inside the server block that is exposed through ngrok.
#
# Expected local path:
#   /var/lib/ai-harness/tasks/
#
# Public URL:
#   https://<ngrok-id>.ngrok-free.app/artifacts/tasks/<task_id>/

location /artifacts/tasks/ {
  auth_basic "AI Harness Artifacts";
  auth_basic_user_file /etc/nginx/.htpasswd;

  alias /var/lib/ai-harness/tasks/;

  # MVP browsing. Replace with generated index.html pages later.
  autoindex on;
  autoindex_exact_size off;
  autoindex_localtime on;

  # Serve text safely in browsers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Cache-Control "private, no-store" always;

  # Keep methods read-only.
  limit_except GET HEAD {
    deny all;
  }
}

# Never expose likely secret material through the artifact route.
location ~* ^/artifacts/tasks/.*(\.env|\.key|\.pem|\.p12|\.sqlite|\.db)$ {
  deny all;
}

location ~* ^/artifacts/tasks/.*(secret|token|cookie|password|credential) {
  deny all;
}
